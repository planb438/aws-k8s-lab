apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno/
    targetRevision: "3.7.2"
    chart: kyverno
    helm:
      values: |
        replicaCount: 2
        admissionController:
          replicaCount: 2
          tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
        backgroundController:
          enabled: true
        cleanupController:
          enabled: true
        reportsController:
          enabled: true
        crds:
          install: true  # <--- CRITICAL: Ensures CRDs are installed
        nodeSelector:
          kubernetes.io/os: linux
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true